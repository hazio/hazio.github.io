<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  width: 1080px;
  height: 1080px;
  background: #0a0a10;
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  display: flex;
  align-items: center;
  justify-content: center;
  position: relative;
  overflow: hidden;
}
.bg {
  position: absolute;
  inset: 0;
  background: url('../papers/creation of adam.png') center/cover;
  opacity: 0.4;
}
.overlay {
  position: absolute;
  inset: 0;
  background: linear-gradient(180deg, rgba(10,10,16,0.5) 0%, rgba(10,10,16,0.8) 100%);
}
.content {
  position: relative;
  z-index: 1;
  text-align: center;
  padding: 80px;
}
h1 {
  color: #fff;
  font-size: 52px;
  font-weight: 700;
  line-height: 1.2;
  letter-spacing: -0.02em;
}
.handle {
  position: absolute;
  bottom: 40px;
  left: 0;
  right: 0;
  text-align: center;
  color: rgba(255,255,255,0.5);
  font-size: 18px;
}
</style>
</head>
<body>
  <div class="bg"></div>
  <div class="overlay"></div>
  <div class="content">
    <h1>The world isn't black and white because you want it to be.</h1>
  </div>
  <div class="handle">@halmetojamodel</div>
</body>
</html>
