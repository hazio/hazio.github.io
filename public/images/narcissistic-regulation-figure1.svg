<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 920" font-family="'Helvetica Neue', Arial, sans-serif">
  <defs>
    <marker id="arr-causal" markerWidth="9" markerHeight="6" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 9 3, 0 6" fill="#e5e5e5"/>
    </marker>
    <marker id="arr-modulate" markerWidth="9" markerHeight="6" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 9 3, 0 6" fill="#60a5fa"/>
    </marker>
    <marker id="arr-vector" markerWidth="9" markerHeight="6" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 9 3, 0 6" fill="#a78bfa"/>
    </marker>
    <marker id="arr-feedback" markerWidth="9" markerHeight="6" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 9 3, 0 6" fill="#ef4444"/>
    </marker>
    <marker id="arr-erd-in" markerWidth="9" markerHeight="6" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 9 3, 0 6" fill="#7c3aed"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="800" height="920" fill="#0a0a0a"/>

  <!-- Title -->
  <text x="400" y="40" text-anchor="middle" fill="#e5e5e5" font-size="18" font-weight="600" letter-spacing="0.5">NARCISSISTIC REGULATION ARCHITECTURE</text>
  <text x="400" y="62" text-anchor="middle" fill="#737373" font-size="11" letter-spacing="1">STRUCTURAL REGULATION FRAMEWORK — PAPER 3, FIGURE 1</text>

  <!-- ===== ACTIVATION SOURCE ===== -->
  <rect x="215" y="85" width="360" height="50" rx="6" fill="#1a1a2e" stroke="#7c3aed" stroke-width="1.5"/>
  <text x="395" y="108" text-anchor="middle" fill="#c4b5fd" font-size="12" font-weight="600">HIGH SELF-RELEVANCE ACTIVATION</text>
  <text x="395" y="125" text-anchor="middle" fill="#737373" font-size="9">(context × interpretation interaction)</text>

  <!-- Causal arrow: activation → architecture -->
  <line x1="395" y1="135" x2="395" y2="165" stroke="#e5e5e5" stroke-width="1.5" marker-end="url(#arr-causal)"/>

  <!-- ===== COMPRESSION FUNNEL (SF visual encoding) ===== -->
  <!-- Asymmetric funnel: wide input narrows to compressed output -->
  <path d="M 330,170 L 460,172 L 425,208 L 370,206 Z" fill="none" stroke="#f59e0b" stroke-width="1.5" opacity="0.7"/>
  <text x="398" y="194" text-anchor="middle" fill="#fbbf24" font-size="8" font-weight="500">COMPRESSION</text>
  <!-- Small resolution indicators inside funnel -->
  <line x1="345" y1="176" x2="345" y2="182" stroke="#f59e0b" stroke-width="0.7" opacity="0.5"/>
  <line x1="355" y1="176" x2="355" y2="183" stroke="#f59e0b" stroke-width="0.7" opacity="0.5"/>
  <line x1="365" y1="176" x2="365" y2="184" stroke="#f59e0b" stroke-width="0.7" opacity="0.5"/>
  <line x1="375" y1="176" x2="375" y2="185" stroke="#f59e0b" stroke-width="0.7" opacity="0.5"/>
  <line x1="385" y1="176" x2="385" y2="185" stroke="#f59e0b" stroke-width="0.7" opacity="0.5"/>
  <line x1="395" y1="176" x2="395" y2="185" stroke="#f59e0b" stroke-width="0.7" opacity="0.5"/>
  <line x1="405" y1="176" x2="405" y2="185" stroke="#f59e0b" stroke-width="0.7" opacity="0.5"/>
  <line x1="415" y1="176" x2="415" y2="184" stroke="#f59e0b" stroke-width="0.7" opacity="0.5"/>
  <line x1="425" y1="176" x2="425" y2="183" stroke="#f59e0b" stroke-width="0.7" opacity="0.5"/>
  <line x1="435" y1="176" x2="435" y2="182" stroke="#f59e0b" stroke-width="0.7" opacity="0.5"/>
  <line x1="445" y1="176" x2="445" y2="181" stroke="#f59e0b" stroke-width="0.7" opacity="0.5"/>
  <!-- Output: fewer, wider bars (low resolution) -->
  <line x1="380" y1="200" x2="380" y2="205" stroke="#f59e0b" stroke-width="2" opacity="0.6"/>
  <line x1="400" y1="200" x2="400" y2="205" stroke="#f59e0b" stroke-width="2" opacity="0.6"/>
  <line x1="418" y1="200" x2="418" y2="205" stroke="#f59e0b" stroke-width="2" opacity="0.6"/>

  <!-- ===== ARCHITECTURE NODES ===== -->

  <!-- IRC node -->
  <rect x="85" y="228" width="180" height="55" rx="6" fill="#0d1b2a" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="175" y="251" text-anchor="middle" fill="#60a5fa" font-size="11" font-weight="600">CONTEXT-SENSITIVE IRC</text>
  <text x="175" y="270" text-anchor="middle" fill="#737373" font-size="9">Holding threshold (reduced</text>
  <text x="175" y="280" text-anchor="middle" fill="#737373" font-size="9">under self-relevant activation)</text>

  <!-- SF node -->
  <rect x="300" y="232" width="185" height="55" rx="6" fill="#1a1400" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="392" y="255" text-anchor="middle" fill="#fbbf24" font-size="11" font-weight="600">REDUCED EFFECTIVE SF</text>
  <text x="392" y="274" text-anchor="middle" fill="#737373" font-size="9">Compressed dichotomous</text>
  <text x="392" y="284" text-anchor="middle" fill="#737373" font-size="9">processing mode</text>

  <!-- ERD node -->
  <rect x="525" y="226" width="185" height="55" rx="6" fill="#1a0a2e" stroke="#7c3aed" stroke-width="1.5"/>
  <text x="617" y="249" text-anchor="middle" fill="#a78bfa" font-size="11" font-weight="600">ELEVATED ERD</text>
  <text x="617" y="268" text-anchor="middle" fill="#737373" font-size="9">Structural dependence on</text>
  <text x="617" y="278" text-anchor="middle" fill="#737373" font-size="9">external regulatory input</text>

  <!-- ERD inward arrows (external environment → ERD node) -->
  <line x1="755" y1="218" x2="715" y2="240" stroke="#7c3aed" stroke-width="1" stroke-dasharray="4,3" opacity="0.7" marker-end="url(#arr-erd-in)"/>
  <line x1="758" y1="268" x2="715" y2="258" stroke="#7c3aed" stroke-width="1" stroke-dasharray="4,3" opacity="0.7" marker-end="url(#arr-erd-in)"/>
  <text x="765" y="246" fill="#7c3aed" font-size="8" opacity="0.6">external</text>
  <text x="765" y="258" fill="#7c3aed" font-size="8" opacity="0.6">input</text>

  <!-- REGULATORY SELF-COHERENCE node -->
  <rect x="280" y="330" width="240" height="50" rx="25" fill="#1a1a2e" stroke="#e5e5e5" stroke-width="1.5" stroke-dasharray="6,3"/>
  <text x="400" y="352" text-anchor="middle" fill="#9ca3af" font-size="10">MAINTAINED</text>
  <text x="400" y="367" text-anchor="middle" fill="#e5e5e5" font-size="12" font-weight="600">REGULATORY SELF-COHERENCE</text>

  <!-- Modulation arrows: nodes → coherence -->
  <line x1="180" y1="285" x2="305" y2="335" stroke="#60a5fa" stroke-width="1.2" stroke-dasharray="5,3" marker-end="url(#arr-modulate)"/>
  <line x1="400" y1="285" x2="400" y2="325" stroke="#f59e0b" stroke-width="1.2" stroke-dasharray="5,3" marker-end="url(#arr-modulate)"/>
  <line x1="620" y1="285" x2="495" y2="335" stroke="#7c3aed" stroke-width="1.2" stroke-dasharray="5,3" marker-end="url(#arr-modulate)"/>

  <!-- Causal arrows: activation → nodes -->
  <line x1="310" y1="130" x2="180" y2="225" stroke="#e5e5e5" stroke-width="1" marker-end="url(#arr-causal)"/>
  <line x1="490" y1="130" x2="620" y2="225" stroke="#e5e5e5" stroke-width="1" marker-end="url(#arr-causal)"/>

  <!-- ===== EXTERNALIZATION VECTORS (asymmetric weighting) ===== -->
  <text x="400" y="415" text-anchor="middle" fill="#737373" font-size="10" letter-spacing="0.5">EXTERNALIZATION VECTORS (illustrative weighting)</text>

  <!-- Validation — THICK (dominant) -->
  <rect x="50" y="440" width="140" height="40" rx="5" fill="#1a1a2e" stroke="#a78bfa" stroke-width="2"/>
  <text x="120" y="465" text-anchor="middle" fill="#c4b5fd" font-size="11" font-weight="600">Validation</text>
  <line x1="330" y1="380" x2="120" y2="435" stroke="#a78bfa" stroke-width="3" marker-end="url(#arr-vector)"/>

  <!-- Dominance — MEDIUM-THICK -->
  <rect x="220" y="440" width="140" height="40" rx="5" fill="#1a1a2e" stroke="#a78bfa" stroke-width="1.5"/>
  <text x="290" y="465" text-anchor="middle" fill="#c4b5fd" font-size="11" font-weight="500">Dominance</text>
  <line x1="370" y1="380" x2="290" y2="435" stroke="#a78bfa" stroke-width="2.2" marker-end="url(#arr-vector)"/>

  <!-- Shame-Defense — MEDIUM -->
  <rect x="390" y="440" width="160" height="40" rx="5" fill="#1a1a2e" stroke="#a78bfa" stroke-width="1.2"/>
  <text x="470" y="465" text-anchor="middle" fill="#c4b5fd" font-size="11" font-weight="500">Shame-Defense</text>
  <line x1="430" y1="380" x2="470" y2="435" stroke="#a78bfa" stroke-width="1.5" marker-end="url(#arr-vector)"/>

  <!-- Withdrawal — THIN -->
  <rect x="580" y="440" width="140" height="40" rx="5" fill="#1a1a2e" stroke="#a78bfa" stroke-width="0.8" opacity="0.7"/>
  <text x="650" y="465" text-anchor="middle" fill="#c4b5fd" font-size="11" font-weight="400" opacity="0.8">Withdrawal</text>
  <line x1="470" y1="380" x2="650" y2="435" stroke="#a78bfa" stroke-width="1" opacity="0.7" marker-end="url(#arr-vector)"/>

  <!-- ===== FEEDBACK LOOP (subdued — secondary to architecture) ===== -->
  <rect x="155" y="540" width="490" height="45" rx="5" fill="#0f0808" stroke="#ef4444" stroke-width="0.8" opacity="0.8"/>

  <text x="225" y="567" text-anchor="middle" fill="#fca5a5" font-size="9" opacity="0.9">Stabilization</text>
  <text x="310" y="567" text-anchor="middle" fill="#737373" font-size="9">→</text>
  <text x="395" y="567" text-anchor="middle" fill="#fca5a5" font-size="9" opacity="0.9">Resistance</text>
  <text x="480" y="567" text-anchor="middle" fill="#737373" font-size="9">→</text>
  <text x="560" y="567" text-anchor="middle" fill="#fca5a5" font-size="9" opacity="0.9">Persistence</text>

  <!-- Feedback from vectors down -->
  <line x1="290" y1="480" x2="290" y2="535" stroke="#555" stroke-width="1" stroke-dasharray="3,3" marker-end="url(#arr-causal)"/>
  <line x1="470" y1="480" x2="470" y2="535" stroke="#555" stroke-width="1" stroke-dasharray="3,3" marker-end="url(#arr-causal)"/>

  <!-- Feedback return arrows (subdued) -->
  <path d="M 645 563 Q 710 563 710 400 Q 710 255 715 255" fill="none" stroke="#ef4444" stroke-width="1" stroke-dasharray="5,3" opacity="0.6" marker-end="url(#arr-feedback)"/>
  <path d="M 155 563 Q 65 563 65 400 Q 65 255 80 255" fill="none" stroke="#ef4444" stroke-width="1" stroke-dasharray="5,3" opacity="0.6" marker-end="url(#arr-feedback)"/>

  <!-- ===== LEGEND ===== -->
  <rect x="120" y="635" width="560" height="110" rx="5" fill="#111" stroke="#333" stroke-width="1"/>
  <text x="400" y="657" text-anchor="middle" fill="#9ca3af" font-size="10" font-weight="600" letter-spacing="0.5">ARROW SEMANTICS</text>

  <line x1="150" y1="680" x2="190" y2="680" stroke="#e5e5e5" stroke-width="1.5" marker-end="url(#arr-causal)"/>
  <text x="200" y="684" fill="#9ca3af" font-size="10">Causal / produces</text>

  <line x1="150" y1="705" x2="190" y2="705" stroke="#60a5fa" stroke-width="1.2" stroke-dasharray="5,3" marker-end="url(#arr-modulate)"/>
  <text x="200" y="709" fill="#9ca3af" font-size="10">Modulates / constrains</text>

  <line x1="150" y1="730" x2="190" y2="730" stroke="#7c3aed" stroke-width="1.2" stroke-dasharray="4,3" marker-end="url(#arr-erd-in)"/>
  <text x="200" y="734" fill="#9ca3af" font-size="10">External regulatory input (ERD)</text>

  <line x1="430" y1="680" x2="470" y2="680" stroke="#a78bfa" stroke-width="2.5"/>
  <text x="480" y="684" fill="#9ca3af" font-size="10">Externalization vector (thickness = weighting)</text>

  <line x1="430" y1="705" x2="470" y2="705" stroke="#ef4444" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arr-feedback)"/>
  <text x="480" y="709" fill="#9ca3af" font-size="10">Reinforcement / feedback loop</text>

  <polygon points="430,722 460,722 452,735 438,735" fill="none" stroke="#f59e0b" stroke-width="1.2"/>
  <text x="480" y="733" fill="#9ca3af" font-size="10">Compression (reduced SF)</text>

  <!-- ===== CAPTION ===== -->
  <text x="400" y="780" text-anchor="middle" fill="#737373" font-size="10" font-style="italic">Figure 1. Proposed candidate architecture for narcissistic regulatory organization within SRF. High self-relevance</text>
  <text x="400" y="798" text-anchor="middle" fill="#737373" font-size="10" font-style="italic">activation passes through a compression stage (reduced SF), interacting with context-sensitive holding capacity</text>
  <text x="400" y="816" text-anchor="middle" fill="#737373" font-size="10" font-style="italic">and elevated external dependence. Asymmetric vector weighting (illustrative) produces patterned externalization</text>
  <text x="400" y="834" text-anchor="middle" fill="#737373" font-size="10" font-style="italic">that preserves short-term coherence while reinforcing structural persistence through feedback.</text>
</svg>