<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  width: 1080px;
  height: 1080px;
  background: #0a0a10;
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 80px;
}
h1 {
  color: #fff;
  font-size: 72px;
  font-weight: 700;
  line-height: 1.2;
  letter-spacing: -0.02em;
  text-align: center;
  margin-bottom: 50px;
}
.sub {
  color: rgba(255,255,255,0.6);
  font-size: 40px;
  line-height: 1.5;
  text-align: center;
}
</style>
</head>
<body>
  <h1>Splitting is not<br>a personality flaw.</h1>
  <p class="sub">It's a compression algorithm<br>for a system that can't<br>afford complexity.</p>
</body>
</html>
