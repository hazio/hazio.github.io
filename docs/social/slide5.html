<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  width: 1080px;
  height: 1080px;
  background: linear-gradient(180deg, #0a0a10 0%, #1a1a1f 100%);
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 80px;
}
h1 {
  color: #fff;
  font-size: 48px;
  font-weight: 700;
  line-height: 1.3;
  letter-spacing: -0.02em;
  text-align: center;
  margin-bottom: 50px;
}
.quote {
  color: #7eb8e0;
  font-size: 26px;
  line-height: 1.6;
  text-align: center;
  font-style: italic;
}
</style>
</head>
<body>
  <h1>The first grey pixel<br>isn't a thought.<br><br>It's a survived contradiction.</h1>
  <p class="quote">"This person disappointed me —<br>and I am still here.<br>They are still here."</p>
</body>
</html>
