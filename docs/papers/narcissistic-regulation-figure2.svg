<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 650" font-family="'Helvetica Neue', Arial, sans-serif">
  <defs>
    <marker id="arrow-down" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#555"/>
    </marker>
    <marker id="arrow-accent" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#8b5cf6"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="900" height="650" fill="#0a0a0a"/>

  <!-- Title -->
  <text x="450" y="40" text-anchor="middle" fill="#e5e5e5" font-size="18" font-weight="600" letter-spacing="0.5">DOMAIN-SELECTIVE FUNCTIONING</text>
  <text x="450" y="62" text-anchor="middle" fill="#737373" font-size="11" letter-spacing="1">STRUCTURAL REGULATION FRAMEWORK — PAPER 3, FIGURE 2</text>

  <!-- Left Panel -->
  <rect x="40" y="90" width="370" height="420" rx="8" fill="#0d1117" stroke="#22c55e" stroke-width="1.5" opacity="0.9"/>
  
  <!-- Left panel header -->
  <rect x="40" y="90" width="370" height="45" rx="8" fill="#052e16" stroke="none"/>
  <rect x="40" y="120" width="370" height="15" fill="#052e16" stroke="none"/>
  <text x="225" y="118" text-anchor="middle" fill="#86efac" font-size="13" font-weight="600">STRUCTURED PERFORMANCE CONTEXT</text>

  <!-- Left panel parameters -->
  <rect x="70" y="155" width="310" height="130" rx="5" fill="#111827" stroke="#374151" stroke-width="1"/>
  <text x="225" y="178" text-anchor="middle" fill="#9ca3af" font-size="10" letter-spacing="0.5">EFFECTIVE PARAMETERS</text>
  
  <circle cx="100" cy="205" r="6" fill="none" stroke="#3b82f6" stroke-width="2"/>
  <text x="115" y="209" fill="#60a5fa" font-size="12">Higher Effective IRC</text>
  
  <circle cx="100" cy="235" r="6" fill="none" stroke="#f59e0b" stroke-width="2"/>
  <text x="115" y="239" fill="#fbbf24" font-size="12">Higher Effective SF</text>
  
  <circle cx="100" cy="265" r="6" fill="none" stroke="#22c55e" stroke-width="2"/>
  <text x="115" y="269" fill="#86efac" font-size="12">Lower ERD Activation</text>

  <!-- Left panel output arrow -->
  <line x1="225" y1="295" x2="225" y2="320" stroke="#555" stroke-width="1.5" marker-end="url(#arrow-down)"/>

  <!-- Left panel outputs -->
  <rect x="70" y="330" width="310" height="110" rx="5" fill="#111827" stroke="#374151" stroke-width="1"/>
  <text x="225" y="353" text-anchor="middle" fill="#9ca3af" font-size="10" letter-spacing="0.5">OBSERVABLE OUTPUT</text>
  
  <text x="100" y="380" fill="#d1d5db" font-size="12">• Preserved competence</text>
  <text x="100" y="405" fill="#d1d5db" font-size="12">• Strategic reasoning</text>
  <text x="100" y="430" fill="#d1d5db" font-size="12">• Behavioral control</text>

  <!-- Left panel bottom label -->
  <text x="225" y="475" text-anchor="middle" fill="#22c55e" font-size="10" opacity="0.7">Low identity threat · Low attachment activation</text>

  <!-- Right Panel -->
  <rect x="490" y="90" width="370" height="420" rx="8" fill="#0d1117" stroke="#dc2626" stroke-width="1.5" opacity="0.9"/>
  
  <!-- Right panel header -->
  <rect x="490" y="90" width="370" height="45" rx="8" fill="#2a0a0a" stroke="none"/>
  <rect x="490" y="120" width="370" height="15" fill="#2a0a0a" stroke="none"/>
  <text x="675" y="118" text-anchor="middle" fill="#fca5a5" font-size="13" font-weight="600">HIGH SELF-RELEVANCE RELATIONAL CONTEXT</text>

  <!-- Right panel parameters -->
  <rect x="520" y="155" width="310" height="130" rx="5" fill="#111827" stroke="#374151" stroke-width="1"/>
  <text x="675" y="178" text-anchor="middle" fill="#9ca3af" font-size="10" letter-spacing="0.5">EFFECTIVE PARAMETERS</text>
  
  <circle cx="550" cy="205" r="6" fill="none" stroke="#3b82f6" stroke-width="2" stroke-dasharray="3,2"/>
  <text x="565" y="209" fill="#60a5fa" font-size="12" opacity="0.7">Lower Effective IRC</text>
  
  <circle cx="550" cy="235" r="6" fill="none" stroke="#f59e0b" stroke-width="2" stroke-dasharray="3,2"/>
  <text x="565" y="239" fill="#fbbf24" font-size="12" opacity="0.7">Reduced Effective SF</text>
  
  <circle cx="550" cy="265" r="6" fill="none" stroke="#dc2626" stroke-width="2"/>
  <text x="565" y="269" fill="#fca5a5" font-size="12">Elevated ERD</text>

  <!-- Right panel output arrow -->
  <line x1="675" y1="295" x2="675" y2="320" stroke="#555" stroke-width="1.5" marker-end="url(#arrow-down)"/>

  <!-- Right panel outputs -->
  <rect x="520" y="330" width="310" height="110" rx="5" fill="#111827" stroke="#374151" stroke-width="1"/>
  <text x="675" y="353" text-anchor="middle" fill="#9ca3af" font-size="10" letter-spacing="0.5">DEFENSIVE VECTOR ACTIVATION</text>
  
  <text x="550" y="380" fill="#c4b5fd" font-size="12">• Validation seeking</text>
  <text x="550" y="405" fill="#c4b5fd" font-size="12">• Dominance regulation</text>
  <text x="550" y="430" fill="#c4b5fd" font-size="12">• Withdrawal / Shame-defense</text>

  <!-- Right panel bottom label -->
  <text x="675" y="475" text-anchor="middle" fill="#dc2626" font-size="10" opacity="0.7">High identity threat · High attachment activation</text>

  <!-- Center connector -->
  <rect x="380" y="260" width="140" height="70" rx="6" fill="#1a1a2e" stroke="#e5e5e5" stroke-width="1"/>
  <text x="450" y="282" text-anchor="middle" fill="#e5e5e5" font-size="10" font-weight="600">Same Individual</text>
  <text x="450" y="300" text-anchor="middle" fill="#737373" font-size="9">Context-Dependent</text>
  <text x="450" y="314" text-anchor="middle" fill="#737373" font-size="9">Regulatory Reorganization</text>

  <!-- Connector arrows (with directionality suggesting dynamic shift) -->
  <line x1="410" y1="295" x2="382" y2="295" stroke="#555" stroke-width="1.2" stroke-dasharray="4,3"/>
  <line x1="490" y1="295" x2="518" y2="295" stroke="#555" stroke-width="1.2" stroke-dasharray="4,3"/>

  <!-- Caption -->
  <text x="450" y="550" text-anchor="middle" fill="#737373" font-size="10" font-style="italic">Figure 2. Proposed domain-selective variation in effective regulatory parameters. The same individual may demonstrate</text>
  <text x="450" y="568" text-anchor="middle" fill="#737373" font-size="10" font-style="italic">preserved functioning in structured low-threat contexts while exhibiting reduced effective holding capacity,</text>
  <text x="450" y="586" text-anchor="middle" fill="#737373" font-size="10" font-style="italic">lower processing flexibility, and intensified defensive vector activation under high self-relevance relational contexts.</text>

  <!-- Key insight box -->
  <rect x="200" y="605" width="500" height="30" rx="4" fill="#111111" stroke="#333" stroke-width="1"/>
  <text x="450" y="624" text-anchor="middle" fill="#9ca3af" font-size="10">Structural capacity is constant — effective regulatory expression reorganizes with activation domain</text>
</svg>