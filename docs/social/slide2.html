<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  width: 1080px;
  height: 1080px;
  background: #0a0a10;
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 80px;
}
h1 {
  color: #fff;
  font-size: 46px;
  font-weight: 700;
  line-height: 1.25;
  letter-spacing: -0.02em;
  text-align: center;
  margin-bottom: 50px;
}
.quote {
  color: #7eb8e0;
  font-size: 28px;
  line-height: 1.5;
  text-align: center;
  font-style: italic;
  margin-bottom: 30px;
}
.sub {
  color: rgba(255,255,255,0.6);
  font-size: 24px;
  line-height: 1.5;
  text-align: center;
}
</style>
</head>
<body>
  <h1>It becomes binary because<br>your system can't hold both<br>at the same time.</h1>
  <p class="quote">"This person hurt me<br>AND is still important to me."</p>
  <p class="sub">That sentence requires a capacity<br>most people don't realize they're missing.</p>
</body>
</html>
